# ── ConfigMap ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend
    tier: application
data:
  PORT: "3001"
  NODE_ENV: production
  # postgres Service name resolves within the same namespace
  DB_HOST: postgres
  DB_PORT: "5432"

---
# ── Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    tier: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: application
    spec:
      containers:
        - name: backend
          image: ${BACKEND_IMAGE}:${IMAGE_TAG}
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ${DB_SECRET_NAME}
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${DB_SECRET_NAME}
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ${DB_SECRET_NAME}
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ── ClusterIP Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
    tier: application
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
